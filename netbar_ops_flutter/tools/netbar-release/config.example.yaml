# NetBar-Ops 发布工具配置
# 拷贝为 config.yaml 后使用

# 签名服务：用于申请 OSS 预签名上传 URL
signature:
  base_url: https://xemoss.wangkaguanli.com
  path: /OSS/Signature.php

# version.json 在 OSS 中的 key（带前导斜杠）
manifest:
  key: /netbaropsflutter/version.json
  backup_prefix: /netbaropsflutter/backups/

# 公共下载基础 URL（用于拉取 version.json + 输出友好下载链接给用户）
public_urls:
  - http://xemaly.wangkaguanli.com:8866
  - https://xemoss.wangkaguanli.com
  - http://xem.oss-cn-hangzhou.aliyuncs.com

# OSS 文件前缀（apk/exe 上传到此目录下）
oss:
  prefix: /netbaropsflutter

# 每个平台最多保留多少条 release 历史
max_releases: 20
